<!DOCTYPE html>

          "surface-container-high": "#222844",
          "secondary-fixed-dim": "#ddc48d",
          "surface": "#0a112c",
          "on-background": "#dde1ff",
          "secondary-container": "#564519",
          "on-primary": "#422d00",
          "primary-fixed-dim": "#f1be62",
          "surface-tint": "#f1be62",
          "surface-container-lowest": "#050c27",
          "on-secondary": "#3d2e05",
          "on-surface-variant": "#d3c5b2",
          "inverse-surface": "#dde1ff",
          "on-surface": "#dde1ff",
          "outline": "#9b8f7e",

          "surface-container": "#171e39",
          "surface-bright": "#313854",
          "surface-dim": "#0a112c",
          "background": "#0a112c",
          "primary": "#ffd388"
        },
        borderRadius: {
          "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"

<style>
  body { font-family: 'Heebo', 'Rubik', sans-serif; background-color: #0a112c; }
  .glass-card { background: rgba(27,35,71,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(44,53,102,0.5); }
  .text-parchment { color: #f5f1e6; }
  .row-current { background: rgba(232,182,90,0.08); border-right: 3px solid #e8b65a; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 h-16">
  <div class="flex flex-row-reverse justify-between items-center px-5 md:px-8 w-full max-w-[600px] mx-auto h-full">
    <div class="font-headline-md text-headline-md font-bold text-primary">שבת בירוחם</div>
    <nav class="hidden md:flex flex-row-reverse gap-4 items-center">
      <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary-fixed-dim transition-colors" href="index.html">בית</a>
      <a class="font-label-md text-label-md text-primary font-bold border-b-2 border-primary pb-1" href="times.html">זמנים</a>
      <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary-fixed-dim transition-colors" href="about.html">אודות</a>
    </nav>
    <button class="p-2 text-primary">
      <span class="material-symbols-outlined">settings</span>
    </button>
  </div>
</header>

<main class="flex-grow pt-24 pb-10 w-full max-w-[600px] mx-auto px-5 md:px-8">

  <!-- Page title -->
  <section class="text-center mb-8">
    <h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">זמני שבת בירוחם</h1>
    <p class="font-body-md text-body-md text-on-surface-variant opacity-80">כניסת ויציאת שבת לשבועות הקרובים</p>
  </section>

  <!-- Desktop table -->
  <div class="glass-card rounded-2xl overflow-hidden hidden md:block mb-6">
    <table class="w-full text-right">
      <thead>
        <tr class="bg-surface-container-high/50 border-b border-outline-variant/30">
          <th class="p-4 font-label-sm text-label-sm text-on-surface-variant">תאריך</th>
          <th class="p-4 font-label-sm text-label-sm text-on-surface-variant">פרשה</th>
          <th class="p-4 font-label-sm text-label-sm text-on-surface-variant">הדלקת נרות</th>
          <th class="p-4 font-label-sm text-label-sm text-on-surface-variant">שקיעה</th>
          <th class="p-4 font-label-sm text-label-sm text-on-surface-variant">צאת השבת</th>
          <th class="p-4 font-label-sm text-label-sm text-on-surface-variant">רבנו תם</th>
        </tr>
      </thead>
      <tbody id="times-tbody-desktop" class="divide-y divide-outline-variant/20"></tbody>
    </table>
  </div>

  <!-- Mobile cards -->
  <div id="times-cards-mobile" class="md:hidden flex flex-col gap-3 mb-6"></div>

  <p class="font-label-sm text-label-sm text-on-surface-variant text-center">
    הזמנים מיועדים לירוחם בלבד ·
    <a href="about.html" class="text-primary hover:underline">כיצד מחושב?</a>
  </p>

</main>

<!-- Footer -->
<footer class="bg-surface-container-lowest border-t border-outline-variant/20 mt-8">
  <div class="flex flex-col items-center gap-4 py-8 w-full max-w-[600px] mx-auto text-center px-5">
    <div class="font-headline-md text-headline-md text-primary mb-2">שבת בירוחם</div>
    <p class="font-label-sm text-label-sm text-on-surface-variant max-w-[80%]">הזמנים מיועדים לירוחם בלבד. כל הזכויות שמורות.</p>
    <div class="flex gap-4">
      <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">תנאי שימוש</a>
      <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">פרטיות</a>
      <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">צור קשר</a>
    </div>
  </div>
</footer>

<!-- Mobile bottom nav -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-surface/90 backdrop-blur-md border-t border-outline-variant/20 h-16 flex justify-around items-center px-4 z-50">
  <a href="index.html" class="flex flex-col items-center text-on-surface-variant">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-label-sm">בית</span>
  </a>
  <a href="times.html" class="flex flex-col items-center text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">schedule</span>
    <span class="text-[10px] font-label-sm">זמנים</span>
  </a>
  <a href="about.html" class="flex flex-col items-center text-on-surface-variant">
    <span class="material-symbols-outlined">info</span>
    <span class="text-[10px] font-label-sm">אודות</span>
  </a>
</nav>

<script>
  const DATA_URL = 'https://raw.githubusercontent.com/ilanmichalby/shabbat-yerucham/main/docs/shabbat-times.json';

  function fmtDate(iso) {
    const [y, m, d] = iso.slice(0, 10).split('-');
    return `${d}.${m}.${y.slice(2)}`;
  }

  async function load() {
    try {
      const res = await fetch(`${DATA_URL}?t=${Date.now()}`);
      const json = await res.json();
      const all = (json.shabbats ?? []).slice().sort((a, b) => a.dateISO.localeCompare(b.dateISO));
      const today = new Date().toISOString().slice(0, 10);
      const currentIdx = all.findIndex(s => s.dateISO >= today);

      // Desktop table
      const tbody = document.getElementById('times-tbody-desktop');
      tbody.innerHTML = all.map((s, i) => {
        const isCurrent = i === currentIdx;
        return `<tr class="${isCurrent ? 'row-current' : 'hover:bg-surface-container-low'} transition-colors">
          <td class="p-4 font-body-md text-body-md text-parchment whitespace-nowrap">
            ${fmtDate(s.dateISO)}
            ${isCurrent ? '<span class="mr-2 text-[11px] bg-yellow-900/40 text-yellow-300 border border-yellow-700/40 rounded-full px-2 py-0.5">השבת הקרובה</span>' : ''}
          </td>
          <td class="p-4 font-body-md text-body-md text-parchment font-medium">${s.parsha}</td>
          <td class="p-4 font-label-md text-primary-fixed-dim font-bold tabular-nums">${s.candleLighting}</td>
          <td class="p-4 font-label-md text-on-surface-variant tabular-nums">${s.sunset}</td>
          <td class="p-4 font-label-md text-primary-fixed-dim font-bold tabular-nums">${s.havdalah}</td>
          <td class="p-4 font-label-md text-on-surface-variant tabular-nums">${s.rabbeinuTam}</td>
        </tr>`;
      }).join('');

      // Mobile cards
      const mobileContainer = document.getElementById('times-cards-mobile');
      mobileContainer.innerHTML = all.map((s, i) => {
        const isCurrent = i === currentIdx;
        return `<div class="glass-card rounded-2xl p-4 ${isCurrent ? 'border-yellow-600/50' : ''}">
          <div class="flex justify-between items-start mb-3">
            <div>
              <div class="font-body-md text-body-md text-parchment font-medium">${s.parsha}</div>
              <div class="font-label-sm text-label-sm text-on-surface-variant mt-0.5">${fmtDate(s.dateISO)}</div>
            </div>
            ${isCurrent ? '<span class="text-[11px] bg-yellow-900/40 text-yellow-300 border border-yellow-700/40 rounded-full px-2 py-0.5">השבת הקרובה</span>' : ''}
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-surface-container rounded-xl p-3 text-center">
              <div class="font-label-sm text-label-sm text-on-surface-variant mb-1">הדלקת נרות</div>
              <div class="text-2xl font-bold text-primary-container tabular-nums">${s.candleLighting}</div>
            </div>
            <div class="bg-surface-container rounded-xl p-3 text-center">
              <div class="font-label-sm text-label-sm text-on-surface-variant mb-1">צאת השבת</div>
              <div class="text-2xl font-bold text-primary-container tabular-nums">${s.havdalah}</div>
            </div>
          </div>
          <div class="flex justify-between mt-2 px-1">
            <span class="font-label-sm text-label-sm text-on-surface-variant">שקיעה: <span class="text-parchment">${s.sunset}</span></span>
            <span class="font-label-sm text-label-sm text-on-surface-variant">ר"ת: <span class="text-parchment">${s.rabbeinuTam}</span></span>
          </div>
        </div>`;
      }).join('');

    } catch(e) {
      document.getElementById('times-tbody-desktop').innerHTML =
        '<tr><td colspan="6" class="p-8 text-center text-on-surface-variant">לא ניתן לטעון נתונים — בדוק חיבור לאינטרנט</td></tr>';
      document.getElementById('times-cards-mobile').innerHTML =
        '<div class="glass-card rounded-2xl p-8 text-center text-on-surface-variant">לא ניתן לטעון נתונים</div>';
    }
  }

  load();
</script>
</body>
</html>
